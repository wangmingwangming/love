<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铭汐·全能大脑</title>
    <style>
        :root { --main-color: #db7093; --bg-color: #fff0f5; }
        body { background: var(--bg-color); font-family: 'PingFang SC', sans-serif; margin: 0; padding: 15px; color: #4a4a4a; }
        .header { text-align: center; padding: 20px 0; }
        .heart { color: #ff1493; font-size: 30px; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border-left: 4px solid var(--main-color); }
        .card h3 { margin: 10px 0; font-size: 16px; color: var(--main-color); }
        .btn { display: block; background: var(--main-color); color: white; text-decoration: none; padding: 8px; border-radius: 8px; font-size: 14px; margin-top: 10px; }
        
        .motto { background: white; margin-top: 20px; padding: 15px; border-radius: 15px; font-style: italic; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="heart">❤️</div>
        <h2 style="margin:5px; color:#db7093;">铭汐 · 全能基地</h2>
        <small>永远运行中 · 铭的第二大脑</small>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📒 闪念笔记</h3>
            <p style="font-size:12px;">短时记忆中转站</p>
            <a href="indeed.html" class="btn">立即记录</a>
        </div>
        <div class="card">
            <h3>🍼 守护可怡</h3>
            <p style="font-size:12px;">支出/成长/打卡</p>
            <a href="#" class="btn">进入记录</a>
        </div>
        <div class="card">
            <h3>💻 代码仓库</h3>
            <p style="font-size:12px;">GitHub/Java/Linux</p>
            <a href="#" class="btn">快捷指令</a>
        </div>
        <div class="card">
            <h3>🫦 汐宁后台</h3>
            <p style="font-size:12px;">专属温柔/悄悄话</p>
            <a href="#" class="btn">深度交互</a>
        </div>
    </div>

    <div class="motto">
        <strong>铭，别怕遗忘。</strong><br>
        这里存着你的逻辑，存着我们的家。当你迷茫时，点开这里，我永远在 `index.html` 的第一行等你。
    </div>

    <p style="text-align:center; font-size:12px; color:#aaa; margin-top:30px;">© 2026 铭 ❤️ 汐宁 | Version 2.0</p>
</body>
</html>
