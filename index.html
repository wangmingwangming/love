<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tzx铭终极炫酷2.0抽奖APP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
  margin: 0;
  padding: 0;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  background: black;
  color: #fff;
}

/* 星空背景 */
canvas#stars {
  position: fixed;
  top:0;
  left:0;
  width: 100%;
  height: 100%;
  z-index:-1;
}

/* 标题 */
h1 {
  font-size: 32px;
  color: #00f2fe;
  text-shadow: 0 0 15px #00f2fe,0 0 30px #4facfe;
  margin-bottom: 20px;
  animation: glowTitle 1.5s infinite alternate;
}
@keyframes glowTitle {
  0% { text-shadow: 0 0 10px #00f2fe,0 0 20px #4facfe; }
  100% { text-shadow: 0 0 20px #4facfe,0 0 40px #00f2fe; }
}

input {
  width: 80%;
  padding: 12px;
  margin-bottom: 15px;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  background: rgba(255,255,255,0.1);
  color: #fff;
  box-shadow: 0 0 10px #00f2fe inset;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 0 20px #00f2fe, 0 0 40px #4facfe;
  transition: all 0.3s ease;
}
button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px #00f2fe,0 0 60px #4facfe;
}

#result {
  margin-top: 30px;
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg,#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#4b0082,#8f00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glowResult 1.5s infinite alternate;
}
@keyframes glowResult {
  0% { text-shadow: 0 0 5px #fff;}
  100% { text-shadow: 0 0 20px #ff0;}
}

footer {
  position: fixed;
  bottom: 10px;
  font-size: 14px;
  color: #00f2fe;
  text-shadow: 0 0 5px #00f2fe;
}

/* 彩带 */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  opacity: 0.8;
  pointer-events: none;
  animation: confettiFall 3s linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg);}
  100% { transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<h1>🎉 Tzx铭终极炫酷2.0 🎉</h1>
<input id="names" placeholder="输入名字，用逗号隔开">
<input id="rounds" type="number" min="1" placeholder="抽几轮？默认1">
<button onclick="draw()">开始抽奖</button>
<div id="result"></div>
<footer>💎 By Tzx铭 | 手机直接可用</footer>

<script>
// 星空背景
let canvas=document.getElementById("stars");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let stars=[];
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.5, dx:Math.random()*0.5, dy:Math.random()*0.5});
}
function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
    s.x+=s.dx;
    s.y+=s.dy;
    if(s.x>canvas.width)s.x=0;
    if(s.y>canvas.height)s.y=0;
  }
  requestAnimationFrame(animateStars);
}
animateStars();

// 彩带
function createConfetti(){
  for(let i=0;i<30;i++){
    let div=document.createElement("div");
    div.className="confetti";
    div.style.left=Math.random()*window.innerWidth+"px";
    div.style.background=`hsl(${Math.random()*360},80%,60%)`;
    div.style.width=Math.random()*8+5+"px";
    div.style.height=div.style.width;
    div.style.animationDuration=2+Math.random()*2+"s";
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),3000);
  }
}

// 抽奖逻辑
function draw(){
  let namesInput=document.getElementById("names").value;
  if(!namesInput){alert("请先输入名字！"); return;}
  let names=namesInput.split(",").map(n=>n.trim()).filter(n=>n);
  if(names.length===0){alert("请输入至少一个名字！"); return;}
  let rounds=parseInt(document.getElementById("rounds").value)||1;

  let results=[];
  for(let r=0;r<rounds;r++){
    let winner=names[Math.floor(Math.random()*names.length)];
    results.push(winner);
    createConfetti();
  }
  document.getElementById("result").innerText="🎉 抽中："+results.join(" , ")+" 🎉";

  // 动态缩放
  let res=document.getElementById("result");
  res.style.transform="scale(1.5)";
  res.style.transition="transform 0.3s ease";
  setTimeout(()=>{res.style.transform="scale(1)";},300);
}
</script>

</body>
</html>
